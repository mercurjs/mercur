name: Issue Triage

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to triage'
        required: true
        type: number

jobs:
  triage:
    runs-on: ubuntu-latest
    # Skip: bot comments, org member comments, labeled wontfix/duplicate
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       github.event.issue.user.type != 'Bot' &&
       !contains(toJSON(github.event.issue.labels.*.name), 'wontfix') &&
       !contains(toJSON(github.event.issue.labels.*.name), 'duplicate')) ||
      (github.event_name == 'issue_comment' &&
       github.event.comment.user.type != 'Bot' &&
       github.event.action == 'created' &&
       github.event.comment.author_association != 'MEMBER' &&
       github.event.comment.author_association != 'OWNER')

    permissions:
      contents: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Fetch issue data (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: fetch_issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE=$(gh issue view ${{ inputs.issue_number }} --json number,title,body,labels --jq '{number, title, body, labels: [.labels[].name]}')
          echo "number=$(echo "$ISSUE" | jq -r '.number')" >> "$GITHUB_OUTPUT"
          echo "title=$(echo "$ISSUE" | jq -r '.title')" >> "$GITHUB_OUTPUT"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$ISSUE" | jq -r '.body' >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "labels=$(echo "$ISSUE" | jq -r '.labels | join(", ")')" >> "$GITHUB_OUTPUT"
          echo "url=https://github.com/${{ github.repository }}/issues/${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"

      - name: Run triage agent
        id: triage
        uses: anthropics/claude-code-action@d59651bd82c48d81756854675ce4fa4d69722200 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            You are an issue triage agent for Mercur — an open-source marketplace framework built on MedusaJS v2.

            Mercur is a monorepo with this structure:
            - packages/core/ — Core Medusa plugin (modules, workflows, providers, API routes)
            - packages/admin/ — Admin dashboard UI (React)
            - packages/vendor/ — Vendor portal UI (React)
            - packages/cli/ — CLI tool (mercurjs command)
            - packages/client/ — API client with codegen types
            - packages/dashboard-sdk/ — Vite plugin for dashboards
            - packages/dashboard-shared/ — Shared UI components
            - packages/registry/ — Official block registry
            - apps/api/ — MedusaJS API application
            - apps/docs/ — Documentation site (Mintlify)

            Key concepts: Blocks (modules, links, workflows, API routes, admin/vendor extensions), Sellers, Offers, Orders, Commissions.

            Analyse this GitHub issue and provide a triage response:

            Issue #${{ steps.fetch_issue.outputs.number || github.event.issue.number }}: ${{ steps.fetch_issue.outputs.title || github.event.issue.title }}

            Body:
            ${{ steps.fetch_issue.outputs.body || github.event.issue.body || github.event.comment.body }}

            Labels: ${{ steps.fetch_issue.outputs.labels || join(github.event.issue.labels.*.name, ', ') }}

            Instructions:
            1. Classify the issue as one of: bug, feature-request, question, duplicate
            2. Search the codebase for files related to the issue
            3. Check open issues for duplicates using gh issue list
            4. Write a suggested response (2-4 sentences, helpful, references specific files when relevant)
            5. Output your analysis in this EXACT format (no markdown fences):

            CLASSIFICATION: {bug|feature-request|question|duplicate}
            RELATED_FILES: {comma-separated file paths, or "none"}
            DUPLICATE_OF: {issue number if duplicate, or "none"}
            SUMMARY: {one-line summary}
            SUGGESTED_RESPONSE: {your draft response}
          claude_args: '--allowed-tools "Bash(gh issue list:*),Bash(gh issue view:*),Bash(gh search:*)"'

      - name: Post to Discord
        if: steps.triage.outputs.result != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_TRIAGE_WEBHOOK_URL }}
          ISSUE_NUMBER: ${{ steps.fetch_issue.outputs.number || github.event.issue.number }}
          ISSUE_TITLE: ${{ steps.fetch_issue.outputs.title || github.event.issue.title }}
          ISSUE_URL: ${{ steps.fetch_issue.outputs.url || github.event.issue.html_url }}
          TRIAGE_RESULT: ${{ steps.triage.outputs.result }}
        run: |
          # Extract classification from result
          CLASSIFICATION=$(echo "$TRIAGE_RESULT" | grep -oP 'CLASSIFICATION: \K.*' | head -1 || echo "unknown")
          SUMMARY=$(echo "$TRIAGE_RESULT" | grep -oP 'SUMMARY: \K.*' | head -1 || echo "$ISSUE_TITLE")
          RELATED=$(echo "$TRIAGE_RESULT" | grep -oP 'RELATED_FILES: \K.*' | head -1 || echo "none")

          # Extract suggested response (everything after SUGGESTED_RESPONSE:)
          SUGGESTED=$(echo "$TRIAGE_RESULT" | sed -n '/^SUGGESTED_RESPONSE: /,$ { s/^SUGGESTED_RESPONSE: //; p }')

          # Pick emoji based on classification
          case "$CLASSIFICATION" in
            bug) EMOJI="🔴" ;;
            feature-request) EMOJI="🟢" ;;
            question) EMOJI="🔵" ;;
            duplicate) EMOJI="🟡" ;;
            *) EMOJI="⚪" ;;
          esac

          # Build Discord message and post via webhook
          SUGGESTED_TRUNC=$(echo "$SUGGESTED" | head -c 800)

          jq -n \
            --arg emoji "$EMOJI" \
            --arg cls "${CLASSIFICATION^^}" \
            --arg num "$ISSUE_NUMBER" \
            --arg summary "$SUMMARY" \
            --arg related "$RELATED" \
            --arg url "$ISSUE_URL" \
            --arg suggested "$SUGGESTED_TRUNC" \
            '{"content": "\($emoji) **\($cls)** \u00b7 mercurjs/mercur#\($num)\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n**\($summary)**\n\n\ud83d\udccd Related: `\($related)`\n\ud83d\udd17 \($url)\n\n\ud83d\udcac **Suggested response:**\n> \($suggested)"}' | \
            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d @-
